services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbotweb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbotweb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbotweb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chatbotweb-api
    profiles: ["app"]
    restart: unless-stopped
    environment:
      DATABASE_URL: ${API_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/chatbotweb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      PHASE: ${PHASE:-mvp-foundation}
      SERVICE_NAME: ${SERVICE_NAME:-chatbotweb-api}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app/apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: chatbotweb-web
    profiles: ["app"]
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
