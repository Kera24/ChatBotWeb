name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/widget/package-lock.json
            packages/widget-sdk/package-lock.json
            tests/widget-browser/package-lock.json

      - name: Install API dependencies
        run: npm run api:install

      - name: Install web dependencies
        run: npm run web:install

      - name: Install widget SDK dependencies
        run: npm run widget-sdk:install

      - name: Install widget app dependencies
        run: npm run widget:install

      - name: Install widget browser test dependencies
        run: npm --prefix tests/widget-browser install

      - name: Install Playwright Chromium
        run: npm --prefix tests/widget-browser run install:browsers

      - name: Run verification
        run: npm run verify
